name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: every job only reads the repo.
permissions:
  contents: read

# Wake is a go.work workspace, but each module builds and tests standalone via
# its own go.mod (and local replace directives). Disabling the workspace makes
# CI exercise each module the way it is released, and lets `go -C tools tool`
# resolve the Task tool (which lives outside the workspace).
env:
  GOWORK: "off"

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on PR commits
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin "${BASE_REF}:${BASE_REF}"
          missing=0
          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            if ! git log -1 --pretty=%B "$commit" | grep -qi '^Signed-off-by: '; then
              echo "Missing Signed-off-by trailer: $commit"
              missing=1
            fi
          done < <(git rev-list --no-merges "origin/${BASE_REF}..HEAD")
          if [ "$missing" -ne 0 ]; then
            echo "DCO check failed. Rebase/amend with: git commit --signoff"
            exit 1
          fi

  reuse:
    name: REUSE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install REUSE tool
        run: python -m pip install --upgrade pip 'reuse==6.2.0'
      - name: Run REUSE lint
        run: reuse lint

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint across all modules
        run: go -C tools tool task lint

  vuln:
    name: Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: govulncheck across all modules
        run: go -C tools tool task vuln

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Test (race) across all modules
        run: go -C tools tool task test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [dco, reuse, lint, vuln, test]
    # Run when the required gates pass; dco is skipped on push to main.
    if: >-
      always() &&
      needs.reuse.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.vuln.result == 'success' &&
      needs.test.result == 'success' &&
      (needs.dco.result == 'success' || needs.dco.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build all modules
        run: go -C tools tool task build

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [dco, reuse, lint, vuln, test, build]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Publish workflow summary
        env:
          DCO_RESULT: ${{ needs.dco.result }}
          REUSE_RESULT: ${{ needs.reuse.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          VULN_RESULT: ${{ needs.vuln.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          {
            echo "## CI Summary"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| dco | $DCO_RESULT |"
            echo "| reuse | $REUSE_RESULT |"
            echo "| lint | $LINT_RESULT |"
            echo "| vuln | $VULN_RESULT |"
            echo "| test | $TEST_RESULT |"
            echo "| build | $BUILD_RESULT |"
          } >> "$GITHUB_STEP_SUMMARY"
