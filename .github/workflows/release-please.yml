name: Release Please

# Maintains the rolling release PR on main. Every push to main creates or
# updates the release PR (version bump + CHANGELOG). Merging that PR makes
# release-please create the vX.Y.Z tag and the GitHub release; goreleaser then
# builds the binaries and uploads them onto that release.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Mint release bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The steps below run only when a release PR was just merged, i.e.
      # release-please created a new tag + GitHub release this run.
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          go-version-file: go.mod

      - name: Build and upload binaries
        if: ${{ steps.release.outputs.release_created }}
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Build each module standalone (see .goreleaser.yaml).
          GOWORK: "off"
          # Upload onto the release release-please just created (release.mode:
          # append in .goreleaser.yaml).
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GORELEASER_CURRENT_TAG: ${{ steps.release.outputs.tag_name }}
          # macOS notarization (cross-platform via quill). When these secrets are
          # unset the notarize block is auto-skipped, so the release still works.
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
